<mat-toolbar class="header-toolbar">
  <!-- Logo Section (Left) -->
  <div class="navbar-logo">
    <img routerLink="/" src="/images/logo.png" alt="app logo">
  </div>

  <!-- Navigation Section (Center) -->
  <nav class="navbar-nav">
    <a routerLink="/" 
       routerLinkActive="nav-active"
       [routerLinkActiveOptions]="{exact: true}"
       class="nav-link">
      Home
    </a>
    <a routerLink="/shop" 
       routerLinkActive="nav-active"
       class="nav-link">
      Shop
    </a>
    <a routerLink="/test-error" 
       routerLinkActive="nav-active"
       class="nav-link">
      Errors
    </a>
  </nav>

  <!-- Actions Section (Right) -->
  <div class="navbar-actions">
    <a routerLink="/cart" 
       routerLinkActive="nav-active" 
       matBadge="{{ cartService.itemCount()}}"
       matBadgeSize="large"
       class="cart-icon">
      <mat-icon>shopping_cart</mat-icon>
    </a>

    <!-- User Profile Menu (shown when logged in) -->
    @if (accountService.isLoggedIn()) {
      <button mat-button [matMenuTriggerFor]="userMenu" class="profile-button">
        <mat-icon>account_circle</mat-icon>
        <span class="profile-name">{{ accountService.currentUser()?.firstName }} {{ accountService.currentUser()?.lastName }}</span>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/account/profile">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item routerLink="/account/orders">
          <mat-icon>receipt</mat-icon>
          <span>My Orders</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    }

    <!-- Login & Register Buttons (shown when not logged in) -->
    @if (!accountService.isLoggedIn()) {
      <button routerLink="/account/login" mat-stroked-button color="primary">Login</button>
      <button routerLink="/account/register" mat-stroked-button color="primary">Register</button>
    }
  </div>
</mat-toolbar>

@if (busyService.loading) {
  <mat-progress-bar mode="indeterminate" class="progress-bar"></mat-progress-bar>
}
